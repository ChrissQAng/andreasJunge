# Apache VirtualHost für Andreas-Junge-Website (Next.js + Payload CMS)
# Reverse Proxy auf den lokalen Node-Prozess (PM2) auf 127.0.0.1:3000
#
# Benötigte Module (einmalig aktivieren):
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite ssl
#
# Datei nach /etc/apache2/sites-available/andreas-junge.conf kopieren,
# yourdomain.com anpassen, dann:
#   sudo a2ensite andreas-junge
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName yourdomain.com

    # Upload-Limit für Media (10 MB, Pendant zu Payload upload.limits.fileSize)
    LimitRequestBody 10485760

    # Forwarded-Header an Next.js/Payload weiterreichen
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"

    # WebSocket-Upgrade (Admin-Panel Live-Updates) zuerst behandeln
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*) http://127.0.0.1:3000/$1 [P,L]

    # Reverse Proxy auf den Node-Prozess
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog  ${APACHE_LOG_DIR}/andreas-junge-error.log
    CustomLog ${APACHE_LOG_DIR}/andreas-junge-access.log combined
</VirtualHost>

# ============================================================
# Nach SSL-Einrichtung mit Certbot (python3-certbot-apache) wird
# automatisch ein zweiter <VirtualHost *:443>-Block erzeugt und
# der Port-80-Block auf HTTPS umgeleitet. Innerhalb des 443-Blocks
# sollte stehen:
#     RequestHeader set X-Forwarded-Proto "https"
# damit Payload korrekte (HTTPS-)URLs erzeugt.
# ============================================================
